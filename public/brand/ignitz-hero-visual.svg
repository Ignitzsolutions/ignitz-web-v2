<svg width="960" height="720" viewBox="0 0 960 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Ignitz operating system visual</title>
  <defs>
    <linearGradient id="bg" x1="96" y1="60" x2="880" y2="652" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9F2"/>
      <stop offset="0.45" stop-color="#F7FAFD"/>
      <stop offset="1" stop-color="#EEF3F8"/>
    </linearGradient>
    <linearGradient id="navyGlow" x1="248" y1="162" x2="608" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17284A"/>
      <stop offset="1" stop-color="#203A69"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="960" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#17284A" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 H 0 V 32" fill="none" stroke="#17284A" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="960" height="720" rx="48" fill="url(#bg)"/>
  <rect x="0" y="0" width="960" height="720" rx="48" fill="url(#grid)"/>
  <g filter="url(#shadow)">
    <rect x="86" y="84" width="788" height="552" rx="36" fill="#FFFFFF" stroke="#DDE3EA"/>
  </g>
  <rect x="126" y="126" width="270" height="168" rx="28" fill="url(#navyGlow)"/>
  <text x="156" y="168" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Workflow intake</text>
  <text x="156" y="200" fill="#D4DDED" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500">Briefs, systems, owners, and handoffs.</text>
  <rect x="156" y="226" width="198" height="16" rx="8" fill="rgba(255,255,255,0.16)"/>
  <rect x="156" y="250" width="166" height="16" rx="8" fill="rgba(255,255,255,0.12)"/>
  <circle cx="347" cy="210" r="18" fill="#F28C22"/>
  <path d="M340 210H354" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M347 203V217" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>

  <rect x="430" y="126" width="348" height="252" rx="28" fill="#FBFCFD" stroke="#E4E9F0"/>
  <text x="462" y="168" fill="#17284A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Active system</text>
  <text x="462" y="198" fill="#5A6473" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500">Operating model running inside the product layer.</text>
  <rect x="462" y="228" width="284" height="64" rx="18" fill="#FFFFFF" stroke="#E4E9F0"/>
  <rect x="478" y="246" width="92" height="12" rx="6" fill="#17284A" fill-opacity="0.84"/>
  <rect x="478" y="268" width="176" height="10" rx="5" fill="#DCE3EB"/>
  <rect x="462" y="308" width="284" height="48" rx="16" fill="#FFF8EF" stroke="#F4D4A8"/>
  <text x="482" y="338" fill="#B85F09" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Human review before release</text>

  <rect x="126" y="328" width="270" height="170" rx="28" fill="#FBFCFD" stroke="#E4E9F0"/>
  <text x="156" y="370" fill="#17284A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Action stack</text>
  <rect x="156" y="392" width="198" height="22" rx="11" fill="#EEF3F8"/>
  <rect x="156" y="424" width="166" height="22" rx="11" fill="#EEF3F8"/>
  <rect x="156" y="456" width="146" height="22" rx="11" fill="#EEF3F8"/>
  <rect x="156" y="392" width="102" height="22" rx="11" fill="#17284A"/>
  <rect x="156" y="424" width="78" height="22" rx="11" fill="#F28C22"/>
  <rect x="156" y="456" width="126" height="22" rx="11" fill="#2F7D68"/>

  <rect x="430" y="398" width="348" height="100" rx="28" fill="#17284A"/>
  <text x="462" y="436" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Outcome signal</text>
  <text x="462" y="466" fill="#D4DDED" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500">Less handoff friction, more reusable operating memory.</text>

  <circle cx="796" cy="176" r="42" fill="#FFF1E1"/>
  <circle cx="796" cy="176" r="23" fill="#F28C22"/>
  <circle cx="796" cy="176" r="8" fill="#FFFFFF"/>

  <path d="M396 210C454 210 476 210 510 210" stroke="#D6DCE4" stroke-width="2" stroke-linecap="round"/>
  <path d="M396 438C450 438 472 438 510 438" stroke="#D6DCE4" stroke-width="2" stroke-linecap="round"/>
  <path d="M776 252C786 252 792 252 796 252V218" stroke="#D6DCE4" stroke-width="2" stroke-linecap="round"/>
  <path d="M776 438C790 438 796 438 796 438V218" stroke="#D6DCE4" stroke-width="2" stroke-linecap="round"/>
</svg>
